<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Členství | Klub Goaters</title>
    <style>
        /* Styl zachováváme stejný pro konzistentní vibe */
        body { background-color: #1a0f00; color: #f4e4bc; font-family: 'Georgia', serif; margin: 0; }
        header { background-color: #3d260a; border-bottom: 3px solid #d4af37; padding: 1.5rem; text-align: center; }
        nav a { background: #d4af37; color: #1a0f00; padding: 12px 25px; text-decoration: none; font-weight: bold; border-radius: 5px; text-transform: uppercase; margin: 0 10px; display: inline-block; }
        .container { max-width: 600px; margin: 50px auto; padding: 40px; background: rgba(45, 30, 10, 0.9); border: 2px solid #d4af37; border-radius: 10px; }
        h2 { font-variant: small-caps; color: #d4af37; text-align: center; }
        form { display: flex; flex-direction: column; gap: 15px; }
        label { font-weight: bold; color: #d4af37; }
        input, select, textarea { padding: 10px; background: #f4e4bc; border: 2px solid #3d260a; border-radius: 4px; font-family: inherit; }
        .submit-btn { background: #d4af37; border: none; padding: 15px; font-weight: bold; cursor: pointer; font-size: 1.1rem; transition: 0.3s; }
        .submit-btn:hover { background: #ffd700; box-shadow: 0 0 10px #ffd700; }
    </style>
</head>
<body>

<header>
    <nav>
        <a href="index.html">Zpět domů</a>
    </nav>
</header>

<div class="container">
    <h2>Vstup do Fanklubu</h2>
    <p style="text-align: center;">Zapečeťte svůj osud a staňte se členem fanklubu série Kozí příběh.</p>
    
    <form action="#" onsubmit="alert('Úpis byl odeslán holubí poštou!'); return false;">
        <label for="name">Jméno hrdiny:</label>
        <input type="text" id="name" placeholder="Jemmy" required>

        <label for="favorite">Nejdražší kousek:</label>
        <select id="favorite">
            <option value="1">Kozí příběh - Pověsti staré Prahy</option>
            <option value="2">Kozí příběh se sýrem</option>
            <option value="both">Oba jsou poklady</option>
        </select>

        <label for="reason">Poslání (proč chceš k nám?):</label>
        <textarea id="reason" rows="4"></textarea>

        <button type="submit" class="submit-btn">ODESLAT ÚPIS</button>
    </form>
</div>

</body>
</html>
