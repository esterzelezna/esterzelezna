<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Úpis člena | Prověrka 📜</title>
    <link href="https://fonts.googleapis.com/css2?family=MedievalSharp&family=Crimson+Pro:ital,wght@1,400;1,600&display=swap" rel="stylesheet">
    <style>
        :root { --wood: #120a03; --parchment: #e6d5b3; --ink: #2b1d0e; --gold: #c5a059; --seal-red: #7a1212; }
        body { background: var(--wood); margin: 0; padding: 0; font-family: 'Crimson Pro', serif; }
        header { background: #261a0d; border-bottom: 2px solid var(--gold); padding: 20px; text-align: center; }
        nav a { font-family: 'MedievalSharp', cursive; color: var(--gold); text-decoration: none; padding: 10px 30px; border: 1px solid var(--gold); }
        
        .parchment-container { display: flex; justify-content: center; padding: 40px 20px; }
        .parchment { 
            max-width: 700px; width: 100%; padding: 60px; background: var(--parchment);
            box-shadow: 0 0 50px #000, inset 0 0 60px rgba(139, 100, 45, 0.2);
            color: var(--ink); border-radius: 3px;
        }

        .importance-box {
            background: rgba(122, 18, 18, 0.1);
            border: 1px double var(--seal-red);
            padding: 20px;
            margin-bottom: 30px;
            font-style: italic;
            text-align: center;
        }

        h2 { font-family: 'MedievalSharp', cursive; color: var(--seal-red); text-align: center; font-size: 2.2rem; }
        .question-block { border-left: 3px solid var(--seal-red); padding-left: 20px; margin-bottom: 25px; }
        label { font-weight: bold; font-variant: small-caps; font-size: 1.1rem; color: #4a341e; display: block; margin-bottom: 8px; }
        input, select, textarea { width: 100%; background: rgba(0,0,0,0.03); border: none; border-bottom: 1px solid var(--ink); padding: 10px; font-family: inherit; font-size: 1.1rem; box-sizing: border-box; }
        
        .seal-button {
            background: var(--seal-red); color: white; border: 4px solid #500; padding: 20px;
            font-family: 'MedievalSharp', cursive; font-size: 1.2rem; cursor: pointer;
            margin-top: 30px; box-shadow: 3px 3px 15px #000; border-radius: 50%;
            width: 160px; height: 160px; align-self: center; display: flex; align-items: center; justify-content: center;
            transition: 0.4s; line-height: 1.2;
        }
        .seal-button:hover { transform: scale(1.1) rotate(-5deg); background: #900; }
    </style>
</head>
<body>

<header><nav><a href="index.html">📜 Zpět do podhradí</a></nav></header>

<div class="parchment-container">
    <section class="parchment">
        <h2>Vědomostní Úpis Poutníka</h2>
        
        <div class="importance-box">
            <strong>Věz, poutníku:</strong> Členství v cechu Goaters ti zaručuje ochranu mistra Hanuše, 
            přednostní právo na sýrové hody a věčnou slávu v análech animovaného umění. 
            Bez naší pečeti jsi jen bludný poutník v digitální pustině!
        </div>
        
        <form onsubmit="alert('Rada starších posoudí tvou hodnověrnost!'); return false;">
            <div class="question-block">
                <label>Jméno a čestné tituly:</label>
                <input type="text" placeholder="Jan Sýrař, rytíř z Kozího hrádku..." required>
            </div>

            <div class="question-block">
                <label>Proč je členství v Goaters důležitější než zlato krále Karla?</label>
                <textarea rows="3" placeholder="Protože sýr a věrnost se nedají koupit..." required></textarea>
            </div>

            <div class="question-block">
                <label>Jakou barvu měly Koziny oči, když viděla Mácu?</label>
                <input type="text" placeholder="Zelenou závistí? Oranžovou hněvem?" required>
            </div>

            <button type="submit" class="seal-button">ZAPECETIT ÚPIS</button>
        </form>
    </section>
</div>

</body>
</html>
