<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Úpis člena | Klub Goaters 📜</title>
    <style>
        /* Opakujeme základní styly z index.html pro konzistenci */
        :root {
            --bg-color: #1a0f00; --parchment-bg: #f4e4bc; --parchment-border: #d4af37;
            --text-color: #3d260a; --header-bg: #3d260a; --header-text: #f4e4bc;
        }
        body { background-color: var(--bg-color); color: var(--header-text); font-family: 'Georgia', serif; margin: 0; }
        header { background-color: var(--header-bg); border-bottom: 4px solid var(--parchment-border); padding: 1.5rem; text-align: center; }
        nav a { background: linear-gradient(to bottom, #d4af37 0%, #a68a2d 100%); color: #1a0f00; padding: 12px 30px; text-decoration: none; font-weight: bold; border-radius: 3px; border: 2px solid #5c4033; display: inline-block; }
        
        /* Pergamen kontejner (stejný jako v indexu) */
        .parchment {
            max-width: 600px; margin: 50px auto; padding: 50px;
            background-color: var(--parchment-bg); color: var(--text-color);
            border: 20px solid transparent;
            border-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="50" height="50" viewBox="0 0 50 50"><path d="M0 0 L50 0 L50 50 L0 50 Z" fill="%23f4e4bc"/><path d="M5 5 L45 5 L45 45 L5 45 Z" fill="none" stroke="%23d4af37" stroke-width="2"/><path d="M0 0 L10 10 M40 10 L50 0 M0 50 L10 40 M40 40 L50 50" stroke="%233d260a" stroke-width="1"/></svg>') 20 stretch;
            box-shadow: 0 10px 40px rgba(0,0,0,0.8);
        }

        h2 { font-variant: small-caps; color: #8B0000; text-align: center; font-size: 2.5rem; margin-top: 0; }
        
        /* --- Stylizace formuláře --- */
        form { display: flex; flex-direction: column; gap: 20px; margin-top: 30px; }
        fieldset { border: 2px solid rgba(139, 0, 0, 0.2); padding: 20px; border-radius: 5px; }
        legend { font-weight: bold; color: #8B0000; padding: 0 10px; font-variant: small-caps; }

        label { font-weight: bold; color: #3d260a; display: block; margin-bottom: 5px; }
        
        input, select, textarea {
            width: 100%; padding: 12px;
            background-color: rgba(255,255,255,0.5); /* Poloprůhledná bílá na pergamenu */
            border: 2px solid #3d260a; border-radius: 3px;
            font-family: inherit; font-size: 1rem;
            box-sizing: border-box; /* Důležité pro padding */
        }
        
        input:focus, select:focus, textarea:focus {
            border-color: #8B0000; background-color: #fff; outline: none;
        }

        /* Tlačítko jako pečeť */
        .submit-btn {
            background: #8B0000; /* Červená jako pečetní vosk */
            color: #f4e4bc;
            border: 4px solid #5c0000;
            padding: 15px;
            font-weight: bold; cursor: pointer; font-size: 1.2rem;
            font-variant: small-caps;
            border-radius: 50px; /* Kulatý tvar pečetě */
            transition: 0.3s;
            margin-top: 20px;
            box-shadow: 0 5px 10px rgba(0,0,0,0.5);
            width: auto; align-self: center; /* Vycentrovat tlačítko */
            padding-left: 40px; padding-right: 40px;
        }

        .submit-btn:hover {
            background: #a52a2a;
            transform: translateY(-3px);
            box-shadow: 0 8px 15px rgba(139,0,0,0.6);
        }
    </style>
</head>
<body>

<header>
    <nav>
        <a href="index.html">📜 Zpět na úvod</a>
    </nav>
</header>

<div class="parchment">
    <h2>Úpis do Fanklubu</h2>
    <p style="text-align: center; font-style: italic;">Zapečeťte svůj osud a přidejte se k milovníkům Kozího příběhu.</p>
    
    <form action="#" onsubmit="alert('Váš úpis byl zapečetěn a odeslán holubí poštou!'); return false;">
        <fieldset>
            <legend>Osobní údaje</legend>
            <label for="name">Jméno hrdiny (nebo přezdívka v cechu):</label>
            <input type="text" id="name" placeholder="Jemmy z podhradí" required>
        </fieldset>

        <fieldset>
            <legend>Věrnost</legend>
            <label for="favorite">Který poklad preferuješ?</label>
            <select id="favorite">
                <option value="1">Kozí příběh - Pověsti staré Prahy</option>
                <option value="2">Kozí příběh se sýrem</option>
                <option value="both">Oba jsou pro mě posvátné</option>
            </select>

            <label for="reason">Proč chceš nosit naše barvy?</label>
            <textarea id="reason" rows="4" placeholder="Chci hlídat pražský orloj..."></textarea>
        </fieldset>

        <button type="submit" class="submit-btn">ZAPECETIT ÚPIS</button>
    </form>
</div>

</body>
</html>
</body>
</html>
