<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Úpis člena | Prověrka znalostí 📜</title>
    <link href="https://fonts.googleapis.com/css2?family=MedievalSharp&family=Crimson+Pro:ital,wght@1,400;1,600&display=swap" rel="stylesheet">
    <style>
        :root { --wood: #120a03; --parchment: #e6d5b3; --ink: #2b1d0e; --gold: #c5a059; --seal-red: #7a1212; }
        body { background: var(--wood); margin: 0; padding: 0; font-family: 'Crimson Pro', serif; }
        header { background: #261a0d; border-bottom: 2px solid var(--gold); padding: 20px; text-align: center; }
        nav a { font-family: 'MedievalSharp', cursive; color: var(--gold); text-decoration: none; padding: 10px 30px; border: 1px solid var(--gold); }
        
        .parchment-container { display: flex; justify-content: center; padding: 40px 20px; }
        .parchment { 
            max-width: 700px; width: 100%; padding: 60px; background: var(--parchment);
            box-shadow: 0 0 50px rgba(0,0,0,0.5), inset 0 0 60px rgba(139, 100, 45, 0.2);
            color: var(--ink); border-radius: 3px; position: relative;
        }

        h2 { font-family: 'MedievalSharp', cursive; color: var(--seal-red); text-align: center; font-size: 2.2rem; border-bottom: 1px solid var(--ink); padding-bottom: 10px; }
        
        form { display: flex; flex-direction: column; gap: 25px; margin-top: 30px; }
        
        .question-block {
            border-left: 3px solid var(--seal-red);
            padding-left: 20px;
            margin-bottom: 10px;
        }

        label { font-weight: bold; font-variant: small-caps; font-size: 1.1rem; color: #4a341e; display: block; margin-bottom: 8px; }
        
        input[type="text"], select, textarea {
            width: 100%;
            background: rgba(0,0,0,0.03);
            border: none;
            border-bottom: 1px solid var(--ink);
            padding: 10px;
            font-family: inherit;
            font-size: 1.1rem;
            color: var(--ink);
            box-sizing: border-box;
        }

        input:focus, textarea:focus { outline: none; border-bottom: 2px solid var(--seal-red); background: rgba(255,255,255,0.3); }

        .radio-group { display: flex; flex-direction: column; gap: 8px; margin-top: 5px; }
        .radio-option { display: flex; align-items: center; gap: 10px; font-style: italic; cursor: pointer; }

        .seal-button {
            background: var(--seal-red);
            color: white;
            border: 4px solid #500;
            padding: 20px;
            font-family: 'MedievalSharp', cursive;
            font-size: 1.2rem;
            cursor: pointer;
            margin-top: 30px;
            box-shadow: 3px 3px 15px rgba(0,0,0,0.5);
            border-radius: 50%;
            width: 160px; height: 160px;
            align-self: center;
            display: flex; align-items: center; justify-content: center; text-align: center;
            transition: 0.4s;
            line-height: 1.2;
        }

        .seal-button:hover {
            transform: scale(1.1) rotate(-5deg);
            background: #900;
            box-shadow: 0 0 25px rgba(122, 18, 18, 0.6);
        }

        .hint { font-size: 0.9rem; opacity: 0.7; font-style: italic; }
    </style>
</head>
<body>

<header>
    <nav><a href="index.html">📜 Návrat do podhradí</a></nav>
</header>

<div class="parchment-container">
    <section class="parchment">
        <h2>Vědomostní Úpis Poutníka</h2>
        <p style="text-align: center; font-style: italic;">Jen ten, kdo zná pravdu o hřebech a sýru, smí usednout u našeho stolu.</p>
        
        <form onsubmit="alert('Tvé odpovědi budou posouzeny radou starších u Orloje!'); return false;">
            
            <div class="question-block">
                <label for="name">Tvůj civilní pseudonym:</label>
                <input type="text" id="name" placeholder="Např. Matěj z vesnice..." required>
            </div>

            <div class="question-block">
                <label>1. Proč Koza v prvním díle tak žárlí na Mácu?</label>
                <div class="radio-group">
                    <label class="radio-option"><input type="radio" name="q1" required> Máca jí krade její oblíbené zelí.</label>
                    <label class="radio-option"><input type="radio" name="q1"> Bojí se, že Kuba kvůli ní zapomene stavět Orloj.</label>
                    <label class="radio-option"><input type="radio" name="q1"> Žárlí na pozornost, kterou Kuba Máce věnuje.</label>
                </div>
            </div>

            <div class="question-block">
                <label for="nails">2. Kolik hřebů (cca) musela Koza sehnat pro stavbu Orloje?</label>
                <input type="text" id="nails" placeholder="Vzpomeň si na tu dřinu..." required>
                <span class="hint">Nápověda: Bylo jich víc, než dokáže průměrný vesničan spočítat.</span>
            </div>

            <div class="question-block">
                <label>3. Jaký osud potkal mistra Hanuše podle filmu?</label>
                <textarea rows="2" placeholder="Popiš tu tragédii vlastními slovy..." required></textarea>
            </div>

            <div class="question-block">
                <label>4. Co je hlavním motivem druhého dílu (Kozí příběh se sýrem)?</label>
                <select required>
                    <option value="">-- Vyber správnou cestu --</option>
                    <option>Hledání ztraceného pokladu Karla IV.</option>
                    <option>Záchrana rodičů z hradu, kde se vyrábí sýr.</option>
                    <option>Válka mezi kozami a lidmi o nadvládu nad Prahou.</option>
                </select>
            </div>

            <div class="question-block">
                <label>5. Doplň slavnou hlášku: "Když se ti to nelíbí..."</label>
                <input type="text" placeholder="...tak si (doplň)" required>
            </div>

            <button type="submit" class="seal-button">ZAPECETIT A ODESLAT RADĚ</button>
        </form>
    </section>
</div>

</body>
</html>
</html>
