<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inkvizice Goaters | Přísaha</title>
    <link href="https://fonts.googleapis.com/css2?family=MedievalSharp&family=Crimson+Pro:ital,wght@1,400;1,700&display=swap" rel="stylesheet">
    <style>
        :root { --wood: #0d0805; --parchment: #c2b280; --blood: #800000; --ink: #1a110a; }
        body { background: var(--wood); color: var(--ink); font-family: 'Crimson Pro', serif; margin: 0; }
        .scroll-container { display: flex; justify-content: center; padding: 50px 20px; }
        .scroll { 
            max-width: 650px; background: var(--parchment); padding: 60px;
            box-shadow: 0 0 100px #000; border-left: 15px solid #a38d5d; border-right: 15px solid #a38d5d;
        }
        h2 { font-family: 'MedievalSharp'; color: var(--blood); text-align: center; font-size: 2.5rem; text-transform: uppercase; }
        .warning { color: var(--blood); text-align: center; font-weight: bold; border: 2px solid var(--blood); padding: 10px; margin-bottom: 30px; }
        
        .ritual-question { margin-bottom: 35px; border-bottom: 1px solid rgba(0,0,0,0.1); padding-bottom: 15px; }
        label { font-weight: bold; font-variant: small-caps; display: block; margin-bottom: 10px; font-size: 1.2rem; }
        input, select, textarea { 
            width: 100%; background: transparent; border: 1px solid rgba(0,0,0,0.2); 
            padding: 10px; font-family: inherit; font-size: 1.1rem; color: var(--ink);
        }
        input:focus { border-color: var(--blood); outline: none; background: rgba(255,255,255,0.2); }

        .blood-btn {
            display: block; width: 100%; padding: 20px; background: var(--blood); color: #fff;
            font-family: 'MedievalSharp'; font-size: 1.5rem; border: none; cursor: pointer;
            box-shadow: 0 5px 15px #000; transition: 0.3s; margin-top: 40px;
        }
        .blood-btn:hover { background: #b30000; letter-spacing: 5px; }
    </style>
</head>
<body>
    <div class="scroll-container">
        <section class="scroll">
            <h2>Úpis Duše Cechu</h2>
            <div class="warning">POZOR: Tento úpis jest věčný. Cesta zpět neexistuje.</div>
            
            <form onsubmit="alert('Tvé vyznání bylo doručeno Guvernérce Mirošníkové!'); return false;">
                
                <div class="ritual-question">
                    <label>1. Tvé světské jméno a původ:</label>
                    <input type="text" placeholder="Kdo jsi před tváří Kozy?" required>
                </div>

                <div class="ritual-question">
                    <label>2. Proč je tvá existence bez Goaters prázdná?</label>
                    <textarea rows="2" required></textarea>
                </div>

                <div class="ritual-question">
                    <label>3. Dokážeš citovat slova, jež Koza pronesla k Mácě v hněvu?</label>
                    <input type="text" placeholder="Slova pravdy..." required>
                </div>

                <div class="ritual-question">
                    <label>4. Kolik slz uronil Kuba, než dokončil dílo své?</label>
                    <select required>
                        <option value="">-- Zvol hloubku smutku --</option>
                        <option>Sedm litrů čistého zoufalství</option>
                        <option>Tolik, kolik je hvězd nad Prahou</option>
                        <option>Žádnou, neboť pil pouze pivo</option>
                    </select>
                </div>

                
                <div class="ritual-question">
                    <label>6. Jsi ochoten obětovat svůj klid pro sýrový blahobyt?</label>
                    <select required>
                        <option>Ano, bez váhání</option>
                        <option>Můj život patří sýru</option>
                    </select>
                </div>

                <div class="ritual-question">
                    <label>7. Co spatřuješ v očích ďáblova vyslance na hradě?</label>
                    <textarea rows="2" placeholder="Spatřuji tam..." required></textarea>
                </div>

                <button type="submit" class="blood-btn">STVRDIT KRVÍ</button>
            </form>
        </section>
    </div>
</body>
</html>
